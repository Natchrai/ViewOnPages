<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Man Head · 360° Viewer</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, "Noto Sans KR", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100svh; background: radial-gradient(circle at 50% 25%, #384553, #11161d 62%); color: #fff; }
    main { min-height: 100svh; display: grid; grid-template-rows: auto 1fr auto; padding: clamp(18px, 3vw, 42px); }
    header { text-align: center; pointer-events: none; z-index: 1; }
    h1 { margin: 0; font-size: clamp(20px, 3vw, 30px); letter-spacing: -.03em; }
    p { margin: 8px 0 0; color: #c6d0da; font-size: 14px; }
    #viewer { min-height: 0; width: min(900px, 100%); margin: 0 auto; position: relative; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #loading { position: absolute; inset: 0; display: grid; place-items: center; color: #dfe8f0; font-size: 14px; transition: opacity .3s; pointer-events: none; }
    #loading.done { opacity: 0; }
    footer { display: flex; justify-content: center; gap: 8px; color: #b5c0ca; font-size: 13px; text-align: center; }
    kbd { font: inherit; color: #fff; padding: 2px 7px; border: 1px solid #52606c; border-radius: 5px; background: #1f2933; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>360° 헤드 뷰어</h1>
      <p>마우스 또는 손가락으로 드래그해 회전하고, 휠·핀치로 확대하세요.</p>
    </header>
    <section id="viewer" aria-label="3D 머리 모델"></section>
    <footer><kbd>드래그</kbd> 회전 <span>·</span> <kbd>휠 / 핀치</kbd> 확대</footer>
  </main>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/controls/OrbitControls.js';

    const host = document.querySelector('#viewer');
    const loading = document.createElement('div');
    loading.id = 'loading';
    loading.textContent = '3D 모델을 불러오는 중…';
    host.append(loading);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(35, 1, 0.01, 100);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    host.append(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x202933, 2.8));
    const key = new THREE.DirectionalLight(0xffffff, 3.2);
    key.position.set(3, 4, 5);
    scene.add(key);
    const rim = new THREE.DirectionalLight(0xa8ceff, 2.2);
    rim.position.set(-4, 2, -3);
    scene.add(rim);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.enableDamping = true;
    controls.dampingFactor = .07;
    controls.minPolarAngle = .35;
    controls.maxPolarAngle = Math.PI - .35;

    function resize() {
      const { width, height } = host.getBoundingClientRect();
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }
    new ResizeObserver(resize).observe(host);

    new GLTFLoader().load('./man_head.glb', (gltf) => {
      const model = gltf.scene;
      scene.add(model);
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);
      controls.target.set(0, 0, 0);
      const distance = Math.max(size.x, size.y, size.z) * 1.55;
      camera.position.set(0, 0, distance);
      controls.minDistance = distance * .55;
      controls.maxDistance = distance * 2.5;
      controls.update();
      loading.classList.add('done');
      setTimeout(() => loading.remove(), 350);
    }, undefined, () => {
      loading.textContent = '모델을 불러오지 못했습니다. HTML과 man_head.glb 파일이 같은 폴더에 있는지 확인하세요.';
    });

    renderer.setAnimationLoop(() => {
      controls.update();
      renderer.render(scene, camera);
    });
  </script>
</body>
</html>
