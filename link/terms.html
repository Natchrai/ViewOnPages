<!DOCTYPE html>
<html lang="en">
<head>

<style>
:root{
  --bg:#020817;
  --line:rgba(126,232,255,.24);
  --line-strong:rgba(126,232,255,.46);
  --text:#f7fbff;
  --muted:#b8cae1;
  --blue:#42dfff;
  --mint:#7df7d4;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  position:relative;
  isolation:isolate;
  overflow-x:hidden;
  background:#020817;
  font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--text);
  line-height:1.72;
}
body::before{
  content:"";
  position:fixed;
  inset:-8%;
  z-index:-3;
  background:url('./assets/viewon-link-main-bg.webp') var(--bg-x,50%) var(--bg-y,50%)/cover no-repeat;
  opacity:0.5;
  animation:zoom 20s ease-in-out infinite alternate;
  filter:brightness(.98) saturate(1.18) blur(.6px);
  pointer-events:none;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 16%,rgba(66,223,255,.12),transparent 36%),
    linear-gradient(
      to bottom,
      rgba(2,8,23,.10),
      rgba(2,8,23,.28) 34%,
      rgba(2,8,23,.54) 100%
    );
  pointer-events:none;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}
a{color:inherit;text-decoration:none}
a:hover{opacity:.92}
img{max-width:100%;display:block}
button,a{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
.topbar{
  position:fixed;
  left:0;
  right:0;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px max(22px,calc((100vw - 1180px)/2));
  background:linear-gradient(to bottom,rgba(2,8,23,.82),rgba(2,8,23,.18),rgba(2,8,23,0));
  backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;letter-spacing:-.03em;color:var(--text)}
.brand img{width:34px;height:34px;border-radius:10px;box-shadow:0 0 22px rgba(66,223,255,.35)}
.nav{display:flex;align-items:center;gap:18px;color:rgba(255,255,255,.82);font-size:14px;font-weight:700}
.nav a{transition:.2s opacity,.2s color}.nav a:hover{color:white;opacity:.92}
.nav .mini-cta{padding:10px 15px;border:1px solid var(--line-strong);border-radius:999px;background:rgba(66,223,255,.12);box-shadow:0 0 24px rgba(66,223,255,.12)}
.language-control{position:relative;display:inline-flex;align-items:center}
.language-trigger{position:relative;display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 36px 0 12px;border:1px solid rgba(126,232,255,.32);border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.055));color:var(--text);box-shadow:0 0 22px rgba(66,223,255,.10),inset 0 1px 0 rgba(255,255,255,.12);font:inherit;font-size:13px;font-weight:900;letter-spacing:-.02em;cursor:pointer;transition:transform .2s ease,border-color .2s ease,background .2s ease,box-shadow .2s ease}
.language-trigger:hover{transform:translateY(-1px);border-color:rgba(126,232,255,.58);background:linear-gradient(135deg,rgba(126,232,255,.16),rgba(255,255,255,.07));box-shadow:0 0 28px rgba(66,223,255,.16),inset 0 1px 0 rgba(255,255,255,.15)}
.language-trigger .language-globe{font-size:15px;line-height:1}
.language-trigger::after{content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid rgba(255,255,255,.72);border-bottom:2px solid rgba(255,255,255,.72);transform:translateY(-65%) rotate(45deg);transition:transform .2s ease}
.language-control.is-open .language-trigger::after{transform:translateY(-35%) rotate(225deg)}
.language-menu{position:absolute;right:0;top:calc(100% + 12px);width:190px;padding:8px;border:1px solid rgba(126,232,255,.32);border-radius:22px;background:linear-gradient(180deg,rgba(6,20,39,.96),rgba(2,8,23,.94));box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 36px rgba(66,223,255,.13),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(18px);opacity:0;visibility:hidden;transform:translateY(-8px) scale(.98);transform-origin:top right;transition:opacity .18s ease,visibility .18s ease,transform .18s ease;z-index:100}
.language-control.is-open .language-menu{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.language-option{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border:0;border-radius:15px;background:transparent;color:rgba(247,251,255,.86);font:inherit;font-size:14px;font-weight:850;letter-spacing:-.02em;cursor:pointer;text-align:left;transition:background .18s ease,color .18s ease,transform .18s ease}
.language-option:hover{background:rgba(126,232,255,.11);color:#fff;transform:translateX(2px)}
.language-option.is-active{background:linear-gradient(135deg,rgba(66,223,255,.18),rgba(125,247,212,.10));color:#fff}
.language-check{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(126,232,255,.30);color:transparent;font-size:12px;flex:0 0 auto}
.language-option.is-active .language-check{color:#7df7d4;border-color:rgba(125,247,212,.55);background:rgba(125,247,212,.12)}
main{
  width:min(960px,calc(100vw - 40px));
  margin:0 auto;
  padding:136px 0 78px;
}
.page-label{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin:0 0 12px;
  color:#95ecff;
  font-size:13px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.page-label::before{
  content:"";
  width:28px;
  height:1px;
  background:linear-gradient(90deg,var(--blue),transparent);
}
h1{
  margin:0;
  font-size:clamp(42px,5.5vw,72px);
  line-height:.98;
  letter-spacing:-.075em;
  text-shadow:0 14px 42px rgba(0,0,0,.45);
}
.intro{
  margin:22px 0 0;
  color:rgba(230,246,255,.9);
  font-size:clamp(17px,1.7vw,21px);
  max-width:780px;
  font-weight:700;
  letter-spacing:-.035em;
}
.updated{margin:10px 0 0;color:rgba(184,202,225,.82);font-size:14px;font-weight:650}
.notice{
  margin:34px 0 0;
  max-width:900px;
  padding:0 0 0 18px;
  border-left:3px solid rgba(125,247,212,.72);
  color:#e7fbff;
  font-size:clamp(16px,1.35vw,18px);
  line-height:1.82;
  font-weight:760;
  letter-spacing:-.035em;
  text-shadow:0 8px 26px rgba(0,0,0,.4);
}
.content{
  margin-top:54px;
  display:grid;
  gap:0;
  border-top:1px solid rgba(126,232,255,.28);
}
section.policy-section{
  display:block;
  padding:34px 0;
  border-bottom:1px solid rgba(126,232,255,.18);
}
section.policy-section:last-child{border-bottom:0}
.policy-number{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  margin:0 12px 0 0;
  color:#95ecff;
  font-size:18px;
  line-height:1;
  font-weight:1000;
  letter-spacing:-.04em;
  vertical-align:.12em;
  text-shadow:0 0 22px rgba(66,223,255,.28);
}
.policy-body h2{
  margin:0 0 12px;
  font-size:clamp(21px,2.1vw,28px);
  line-height:1.28;
  letter-spacing:-.055em;
  color:#f7fbff;
  white-space:normal;
}
.policy-body p{
  margin:0 0 0 54px;
  max-width:860px;
  color:rgba(202,224,240,.88);
  font-size:16.5px;
  line-height:1.86;
  font-weight:620;
  letter-spacing:-.03em;
}
.back-row{margin-top:34px}
.back-row a{display:inline-flex;align-items:center;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line-strong);background:rgba(66,223,255,.12);font-weight:900;color:white}
.footer{padding:46px max(22px,calc((100vw - 1180px)/2));color:rgba(255,255,255,.58);display:flex;align-items:center;justify-content:space-between;gap:20px;border-top:1px solid rgba(255,255,255,.08);background:rgba(2,8,23,.52);backdrop-filter:blur(8px)}
.footer strong{color:white}.footer-links{display:flex;gap:16px;flex-wrap:wrap}.footer a{color:rgba(255,255,255,.70)}
html[dir="rtl"] body{font-family:Arial,"Noto Sans Arabic","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
html[dir="rtl"] .topbar,html[dir="rtl"] .nav,html[dir="rtl"] .brand,html[dir="rtl"] .footer{direction:rtl}
html[dir="rtl"] main,html[dir="rtl"] .policy-section{text-align:right}
html[dir="rtl"] .page-label::before{background:linear-gradient(270deg,var(--blue),transparent)}
html[dir="rtl"] .notice{padding:0 18px 0 0;border-left:0;border-right:3px solid rgba(125,247,212,.72)}
html[dir="rtl"] .language-trigger{padding:0 12px 0 36px}
html[dir="rtl"] .language-trigger::after{right:auto;left:14px}
html[dir="rtl"] .language-menu{right:auto;left:0;transform-origin:top left}
html[dir="rtl"] .language-option{text-align:right}
html[dir="rtl"] .language-option:hover{transform:translateX(-2px)}
@media (max-width:960px){
  .nav a:not(.mini-cta){display:none}
  .language-trigger{min-height:36px;padding-right:34px}
  .language-menu{width:180px}
}
@media (max-width:700px){
  body::before{
    inset:-12%;
    background-size:auto 118%;
    filter:brightness(.95) saturate(1.14) blur(.4px);
  }
  .topbar{padding:14px 18px}.brand span{font-size:15px}.topbar .mini-cta{padding:9px 12px;font-size:13px}
  main{width:calc(100vw - 36px);padding-top:108px;padding-bottom:64px}
  h1{font-size:42px}.intro{font-size:16px}
  .notice{padding-left:14px;font-size:15.5px}
  .content{margin-top:40px}
  section.policy-section{padding:28px 0}
  .policy-number{min-width:34px;margin-right:10px;font-size:16px}
  .policy-body h2{font-size:22px}
  .policy-body p{margin-left:44px;font-size:15.5px}
  .footer{flex-direction:column;align-items:flex-start;padding:36px 18px}
}
</style>

const DEFAULT_LANG = "en";
const RTL_LANGS = new Set(["ar"]);

function getInitialLang() {
  const saved = localStorage.getItem("viewon_language");
  if (saved && TITLES[saved]) return saved;
  const browser = (navigator.language || DEFAULT_LANG).slice(0, 2).toLowerCase();
  return TITLES[browser] ? browser : DEFAULT_LANG;
}

function setTextForCommon(lang) {
  document.querySelectorAll("[data-common]").forEach((el) => {
    const key = el.getAttribute("data-common");
    if (COMMON[lang] && COMMON[lang][key]) el.textContent = COMMON[lang][key];
  });
}

function render(lang) {
  document.documentElement.lang = lang;
  document.documentElement.dir = RTL_LANGS.has(lang) ? "rtl" : "ltr";
  document.title = "ViewOn Link - " + TITLES[lang];
  document.getElementById("pageTitle").textContent = TITLES[lang];
  document.getElementById("pageIntro").textContent = INTROS[lang];
  document.getElementById("updatedText").textContent = UPDATED[lang];
  document.getElementById("noticeText").textContent = NOTICE[lang];

  const content = document.getElementById("content");
  content.innerHTML = "";
  SECTIONS[lang].forEach(([heading, body]) => {
    const section = document.createElement("section");
    section.className = "policy-section";
    const h2 = document.createElement("h2");
    h2.textContent = heading;
    const p = document.createElement("p");
    p.textContent = body;
    section.appendChild(h2);
    section.appendChild(p);
    content.appendChild(section);
  });

  setTextForCommon(lang);
  syncLanguageMenu(lang);
  localStorage.setItem("viewon_language", lang);
}

const languageControl = document.getElementById("languageControl");
const languageTrigger = document.getElementById("languageTrigger");
const languageCurrent = document.getElementById("languageCurrent");
const languageOptions = Array.from(document.querySelectorAll("[data-lang-option]"));

function syncLanguageMenu(lang) {
  if (languageCurrent) languageCurrent.textContent = LANG_NAMES[lang] || LANG_NAMES[DEFAULT_LANG];
  languageOptions.forEach((option) => {
    const isActive = option.getAttribute("data-lang-option") === lang;
    option.classList.toggle("is-active", isActive);
    option.setAttribute("aria-selected", isActive ? "true" : "false");
  });
}

function closeLanguageMenu() {
  if (!languageControl) return;
  languageControl.classList.remove("is-open");
  if (languageTrigger) languageTrigger.setAttribute("aria-expanded", "false");
}

function openLanguageMenu() {
  if (!languageControl) return;
  languageControl.classList.add("is-open");
  if (languageTrigger) languageTrigger.setAttribute("aria-expanded", "true");
}

if (languageTrigger) {
  languageTrigger.addEventListener("click", (event) => {
    event.stopPropagation();
    if (languageControl.classList.contains("is-open")) closeLanguageMenu();
    else openLanguageMenu();
  });
}

languageOptions.forEach((option) => {
  option.addEventListener("click", () => {
    const lang = option.getAttribute("data-lang-option");
    if (lang && TITLES[lang]) render(lang);
    closeLanguageMenu();
  });
});

document.addEventListener("click", (event) => {
  if (!languageControl || !languageControl.contains(event.target)) closeLanguageMenu();
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeLanguageMenu();
});

const initialLang = getInitialLang();
render(initialLang);
</script>
