<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#020817" />
<title>ViewOn Link - Privacy Policy</title>
<meta name="description" content="ViewOn Link Privacy Policy page." />
<style>
:root{
  --bg:#020817;
  --line:rgba(126,232,255,.24);
  --line-strong:rgba(126,232,255,.46);
  --text:#f7fbff;
  --muted:#b8cae1;
  --blue:#42dfff;
  --mint:#7df7d4;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--bg)}
body{
  margin:0;
  min-height:100vh;
  position:relative;
  isolation:isolate;
  overflow-x:hidden;
  background:#020817;
  font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  color:var(--text);
  line-height:1.72;
}
body::before{
  content:"";
  position:fixed;
  inset:-8%;
  z-index:-3;
  background:url('./assets/viewon-link-main-bg.webp') var(--bg-x,50%) var(--bg-y,50%)/cover no-repeat;
  opacity:0.5;
  animation:zoom 20s ease-in-out infinite alternate;
  filter:brightness(.98) saturate(1.18) blur(.6px);
  pointer-events:none;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:
    radial-gradient(circle at 50% 16%,rgba(66,223,255,.12),transparent 36%),
    linear-gradient(
      to bottom,
      rgba(2,8,23,.10),
      rgba(2,8,23,.28) 34%,
      rgba(2,8,23,.54) 100%
    );
  pointer-events:none;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}
a{color:inherit;text-decoration:none}
a:hover{opacity:.92}
img{max-width:100%;display:block}
button,a{-webkit-tap-highlight-color:transparent;tap-highlight-color:transparent}
.topbar{
  position:fixed;
  left:0;
  right:0;
  top:0;
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:18px max(22px,calc((100vw - 1180px)/2));
  background:linear-gradient(to bottom,rgba(2,8,23,.82),rgba(2,8,23,.18),rgba(2,8,23,0));
  backdrop-filter:blur(10px);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;letter-spacing:-.03em;color:var(--text)}
.brand img{width:34px;height:34px;border-radius:10px;box-shadow:0 0 22px rgba(66,223,255,.35)}
.nav{display:flex;align-items:center;gap:18px;color:rgba(255,255,255,.82);font-size:14px;font-weight:700}
.nav a{transition:.2s opacity,.2s color}.nav a:hover{color:white;opacity:.92}
.nav .mini-cta{padding:10px 15px;border:1px solid var(--line-strong);border-radius:999px;background:rgba(66,223,255,.12);box-shadow:0 0 24px rgba(66,223,255,.12)}
.language-control{position:relative;display:inline-flex;align-items:center}
.language-trigger{position:relative;display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 36px 0 12px;border:1px solid rgba(126,232,255,.32);border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.055));color:var(--text);box-shadow:0 0 22px rgba(66,223,255,.10),inset 0 1px 0 rgba(255,255,255,.12);font:inherit;font-size:13px;font-weight:900;letter-spacing:-.02em;cursor:pointer;transition:transform .2s ease,border-color .2s ease,background .2s ease,box-shadow .2s ease}
.language-trigger:hover{transform:translateY(-1px);border-color:rgba(126,232,255,.58);background:linear-gradient(135deg,rgba(126,232,255,.16),rgba(255,255,255,.07));box-shadow:0 0 28px rgba(66,223,255,.16),inset 0 1px 0 rgba(255,255,255,.15)}
.language-trigger .language-globe{font-size:15px;line-height:1}
.language-trigger::after{content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid rgba(255,255,255,.72);border-bottom:2px solid rgba(255,255,255,.72);transform:translateY(-65%) rotate(45deg);transition:transform .2s ease}
.language-control.is-open .language-trigger::after{transform:translateY(-35%) rotate(225deg)}
.language-menu{position:absolute;right:0;top:calc(100% + 12px);width:190px;padding:8px;border:1px solid rgba(126,232,255,.32);border-radius:22px;background:linear-gradient(180deg,rgba(6,20,39,.96),rgba(2,8,23,.94));box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 36px rgba(66,223,255,.13),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(18px);opacity:0;visibility:hidden;transform:translateY(-8px) scale(.98);transform-origin:top right;transition:opacity .18s ease,visibility .18s ease,transform .18s ease;z-index:100}
.language-control.is-open .language-menu{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.language-option{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border:0;border-radius:15px;background:transparent;color:rgba(247,251,255,.86);font:inherit;font-size:14px;font-weight:850;letter-spacing:-.02em;cursor:pointer;text-align:left;transition:background .18s ease,color .18s ease,transform .18s ease}
.language-option:hover{background:rgba(126,232,255,.11);color:#fff;transform:translateX(2px)}
.language-option.is-active{background:linear-gradient(135deg,rgba(66,223,255,.18),rgba(125,247,212,.10));color:#fff}
.language-check{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(126,232,255,.30);color:transparent;font-size:12px;flex:0 0 auto}
.language-option.is-active .language-check{color:#7df7d4;border-color:rgba(125,247,212,.55);background:rgba(125,247,212,.12)}
main{
  width:min(960px,calc(100vw - 40px));
  margin:0 auto;
  padding:136px 0 78px;
}
.page-label{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin:0 0 12px;
  color:#95ecff;
  font-size:13px;
  font-weight:900;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.page-label::before{
  content:"";
  width:28px;
  height:1px;
  background:linear-gradient(90deg,var(--blue),transparent);
}
h1{
  margin:0;
  font-size:clamp(42px,5.5vw,72px);
  line-height:.98;
  letter-spacing:-.075em;
  text-shadow:0 14px 42px rgba(0,0,0,.45);
}
.intro{
  margin:22px 0 0;
  color:rgba(230,246,255,.9);
  font-size:clamp(17px,1.7vw,21px);
  max-width:780px;
  font-weight:700;
  letter-spacing:-.035em;
}
.updated{margin:10px 0 0;color:rgba(184,202,225,.82);font-size:14px;font-weight:650}
.notice{
  margin:34px 0 0;
  max-width:900px;
  padding:0 0 0 18px;
  border-left:3px solid rgba(125,247,212,.72);
  color:#e7fbff;
  font-size:clamp(16px,1.35vw,18px);
  line-height:1.82;
  font-weight:760;
  letter-spacing:-.035em;
  text-shadow:0 8px 26px rgba(0,0,0,.4);
}
.content{
  margin-top:54px;
  display:grid;
  gap:0;
  border-top:1px solid rgba(126,232,255,.28);
}
section.policy-section{
  display:block;
  padding:34px 0;
  border-bottom:1px solid rgba(126,232,255,.18);
}
section.policy-section:last-child{border-bottom:0}
.policy-number{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:42px;
  margin:0 12px 0 0;
  color:#95ecff;
  font-size:18px;
  line-height:1;
  font-weight:1000;
  letter-spacing:-.04em;
  vertical-align:.12em;
  text-shadow:0 0 22px rgba(66,223,255,.28);
}
.policy-body h2{
  margin:0 0 12px;
  font-size:clamp(21px,2.1vw,28px);
  line-height:1.28;
  letter-spacing:-.055em;
  color:#f7fbff;
  white-space:normal;
}
.policy-body p{
  margin:0 0 0 54px;
  max-width:860px;
  color:rgba(202,224,240,.88);
  font-size:16.5px;
  line-height:1.86;
  font-weight:620;
  letter-spacing:-.03em;
}
.back-row{margin-top:34px}
.back-row a{display:inline-flex;align-items:center;min-height:44px;padding:0 16px;border-radius:999px;border:1px solid var(--line-strong);background:rgba(66,223,255,.12);font-weight:900;color:white}
.footer{padding:46px max(22px,calc((100vw - 1180px)/2));color:rgba(255,255,255,.58);display:flex;align-items:center;justify-content:space-between;gap:20px;border-top:1px solid rgba(255,255,255,.08);background:rgba(2,8,23,.52);backdrop-filter:blur(8px)}
.footer strong{color:white}.footer-links{display:flex;gap:16px;flex-wrap:wrap}.footer a{color:rgba(255,255,255,.70)}
html[dir="rtl"] body{font-family:Arial,"Noto Sans Arabic","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
html[dir="rtl"] .topbar,html[dir="rtl"] .nav,html[dir="rtl"] .brand,html[dir="rtl"] .footer{direction:rtl}
html[dir="rtl"] main,html[dir="rtl"] .policy-section{text-align:right}
html[dir="rtl"] .page-label::before{background:linear-gradient(270deg,var(--blue),transparent)}
html[dir="rtl"] .notice{padding:0 18px 0 0;border-left:0;border-right:3px solid rgba(125,247,212,.72)}
html[dir="rtl"] .language-trigger{padding:0 12px 0 36px}
html[dir="rtl"] .language-trigger::after{right:auto;left:14px}
html[dir="rtl"] .language-menu{right:auto;left:0;transform-origin:top left}
html[dir="rtl"] .language-option{text-align:right}
html[dir="rtl"] .language-option:hover{transform:translateX(-2px)}
@media (max-width:960px){
  .nav a:not(.mini-cta){display:none}
  .language-trigger{min-height:36px;padding-right:34px}
  .language-menu{width:180px}
}
@media (max-width:700px){
  body::before{
    inset:-12%;
    background-size:auto 118%;
    filter:brightness(.95) saturate(1.14) blur(.4px);
  }
  .topbar{padding:14px 18px}.brand span{font-size:15px}.topbar .mini-cta{padding:9px 12px;font-size:13px}
  main{width:calc(100vw - 36px);padding-top:108px;padding-bottom:64px}
  h1{font-size:42px}.intro{font-size:16px}
  .notice{padding-left:14px;font-size:15.5px}
  .content{margin-top:40px}
  section.policy-section{padding:28px 0}
  .policy-number{min-width:34px;margin-right:10px;font-size:16px}
  .policy-body h2{font-size:22px}
  .policy-body p{margin-left:44px;font-size:15.5px}
  .footer{flex-direction:column;align-items:flex-start;padding:36px 18px}
}
</style>
</head>
<body>

<script>
const PAGE_KEY = "privacy";
const TITLES = {"en": "Privacy Policy", "ko": "개인정보처리방침", "ja": "プライバシーポリシー", "ar": "سياسة الخصوصية", "de": "Datenschutzerklärung", "es": "Política de privacidad", "fr": "Politique de confidentialité"};
const INTROS = {"en": "This page explains how ViewOn Link uses information for QR-based camera connection, support, and future service operation.", "ko": "이 페이지는 ViewOn Link가 QR 기반 카메라 연결, 지원, 향후 서비스 운영을 위해 정보를 어떻게 사용하는지 설명합니다.", "ja": "このページでは、ViewOn LinkがQRベースのカメラ接続、サポート、今後のサービス運営のために情報をどのように使用するかを説明します。", "ar": "توضح هذه الصفحة كيفية استخدام ViewOn Link للمعلومات من أجل اتصال الكاميرا عبر QR والدعم وتشغيل الخدمة مستقبلًا.", "de": "Diese Seite erklärt, wie ViewOn Link Informationen für QR-basierte Kameraverbindungen, Support und den zukünftigen Dienstbetrieb verwendet.", "es": "Esta página explica cómo ViewOn Link usa información para la conexión de cámara mediante QR, soporte y operación futura del servicio.", "fr": "Cette page explique comment ViewOn Link utilise les informations pour la connexion caméra par QR, l’assistance et l’exploitation future du service."};
const SECTIONS = {"en": [["1. Information we do not require", "ViewOn Link does not require account registration for the basic camera connection feature. We do not ask for your name, phone number, contacts, or precise location to use this feature."], ["2. Camera, photos, and videos", "Camera permission is used for camera preview, QR scanning, magnifier mode, and streaming the camera view to the paired device. Photos or videos are saved only when you choose to capture or record, and they are stored on your device."], ["3. Temporary connection data", "To connect devices, ViewOn Link may create temporary connection values such as a room ID, offer, answer, and network candidate information. These values are used only to set up and maintain the connection and are designed to be deleted when the connection ends."], ["4. Same Wi‑Fi and connection quality", "ViewOn Link is designed mainly for use when both devices are connected to the same Wi‑Fi network. The app may check network status to guide the user and may need a short time after connection to adjust image quality based on connection status and device performance."], ["5. Third-party services", "ViewOn Link may use Firebase services for temporary connection signaling, update configuration, and service stability. These services may process technical data needed to provide and secure the service."], ["6. Website language preference", "This website may save the selected language in the browser’s local storage so the page can open in the same language next time."], ["7. Free testing, future Pro features, and in-app purchases", "ViewOn Link is currently provided as a free testing/open test service. Based on testing results and user feedback, some features may be added, changed, or separated as Pro features in the future, and in-app purchases may be introduced. Any paid feature will be clearly shown before purchase, and payments will be processed through the official app market payment system."], ["8. Data sharing and sale", "ViewOn Link does not sell personal information. ViewOn Link does not share or sell your camera screen, photos, or videos to advertisers. Even if future Pro features or in-app purchases are added, personal information will not be sold or shared for advertising purposes."], ["9. Contact", "For privacy questions, contact us at natchrai75@Gmail.com."]], "ko": [["1. 요구하지 않는 정보", "ViewOn Link는 기본 카메라 연결 기능 사용을 위해 계정 가입을 요구하지 않습니다. 이름, 전화번호, 연락처, 정확한 위치 정보를 요구하지 않습니다."], ["2. 카메라, 사진 및 영상", "카메라 권한은 카메라 미리보기, QR 코드 스캔, 돋보기 모드, 연결된 기기로의 카메라 화면 전송을 위해 사용됩니다. 사진 또는 영상은 사용자가 직접 촬영 또는 녹화를 선택한 경우에만 저장되며, 사용자의 기기에 저장됩니다."], ["3. 임시 연결 정보", "기기를 연결하기 위해 ViewOn Link는 room ID, offer, answer, network candidate 같은 임시 연결 값을 생성할 수 있습니다. 이 값은 연결을 설정하고 유지하는 동안에만 사용되며, 연결이 종료되면 삭제되도록 설계되어 있습니다."], ["4. 같은 Wi‑Fi와 연결 품질", "ViewOn Link는 주로 두 기기가 같은 Wi‑Fi 네트워크에 연결된 상태에서 사용하도록 설계되어 있습니다. 앱은 연결 전 안내를 위해 네트워크 상태를 확인할 수 있으며, 연결 후에는 연결 상태와 기기 성능을 고려해 화질을 조정하는 시간이 잠시 필요할 수 있습니다."], ["5. 제3자 서비스", "ViewOn Link는 임시 연결 신호 처리, 업데이트 설정 확인, 서비스 안정성을 위해 Firebase 서비스를 사용할 수 있습니다. 해당 서비스는 기능 제공과 보안을 위해 필요한 기술 정보를 처리할 수 있습니다."], ["6. 웹사이트 언어 설정", "이 웹사이트는 다음 방문 시 같은 언어로 열 수 있도록 사용자가 선택한 언어를 브라우저의 로컬 저장소에 저장할 수 있습니다."], ["7. 무료 테스트, 향후 Pro 기능 및 인앱결제", "ViewOn Link는 현재 무료 테스트/오픈 테스트 형태로 제공되고 있습니다. 향후 테스트 결과와 사용자 의견을 반영해 일부 기능이 추가, 변경되거나 Pro 기능으로 분리될 수 있으며, 인앱결제가 도입될 수 있습니다. 유료 기능은 구매 전 가격과 조건을 명확히 안내하며, 결제는 각 앱 마켓의 공식 결제 시스템을 통해 처리됩니다."], ["8. 정보 공유 및 판매", "ViewOn Link는 개인정보를 판매하지 않습니다. 카메라 화면, 사진, 영상을 광고주와 공유하거나 판매하지 않습니다. 향후 Pro 기능 또는 인앱결제가 추가되더라도 개인정보를 판매하거나 광고 목적으로 공유하지 않습니다."], ["9. 문의", "개인정보 관련 문의는 natchrai75@Gmail.com 으로 연락해 주세요."]], "ja": [["1. 収集を必要としない情報", "ViewOn Linkは、基本的なカメラ接続機能の利用にアカウント登録を必要としません。氏名、電話番号、連絡先、正確な位置情報を求めません。"], ["2. カメラ、写真、動画", "カメラ権限は、カメラプレビュー、QRコードのスキャン、拡大鏡モード、接続された端末へのカメラ映像の送信に使用されます。写真や動画は、ユーザーが撮影または録画を選択した場合にのみ端末に保存されます。"], ["3. 一時的な接続情報", "端末を接続するため、ViewOn Linkはroom ID、offer、answer、network candidateなどの一時的な接続値を生成する場合があります。これらは接続の設定と維持にのみ使用され、接続終了時に削除されるよう設計されています。"], ["4. 同じWi‑Fiと接続品質", "ViewOn Linkは主に2台の端末が同じWi‑Fiネットワークに接続された状態で使用するよう設計されています。接続後、接続状態や端末性能に応じて画質を調整するため、短い時間が必要になる場合があります。"], ["5. 第三者サービス", "ViewOn Linkは、一時的な接続シグナル処理、アップデート設定の確認、サービス安定性のためにFirebaseサービスを使用する場合があります。"], ["6. ウェブサイトの言語設定", "このウェブサイトは、次回も同じ言語で表示するため、選択された言語をブラウザのローカルストレージに保存する場合があります。"], ["7. 無料テスト、今後のPro機能、アプリ内課金", "ViewOn Linkは現在、無料テスト／オープンテストとして提供されています。今後、テスト結果やユーザーのフィードバックを反映し、一部機能が追加・変更されたり、Pro機能として分離されたり、アプリ内課金が導入される場合があります。有料機能は購入前に価格と条件を明確に表示し、決済は各アプリマーケットの公式決済システムを通じて処理されます。"], ["8. 情報の共有および販売", "ViewOn Linkは個人情報を販売しません。カメラ画面、写真、動画を広告主に共有または販売しません。"], ["9. お問い合わせ", "プライバシーに関するお問い合わせ: natchrai75@Gmail.com"]], "ar": [["1. معلومات لا نطلبها", "لا يتطلب ViewOn Link إنشاء حساب لاستخدام ميزة اتصال الكاميرا الأساسية. لا نطلب الاسم أو رقم الهاتف أو جهات الاتصال أو الموقع الدقيق."], ["2. الكاميرا والصور والفيديو", "تُستخدم صلاحية الكاميرا للمعاينة ومسح QR ووضع المكبّر وبث عرض الكاميرا إلى الجهاز المقترن. لا تُحفظ الصور أو الفيديو إلا إذا اخترت الالتقاط أو التسجيل."], ["3. بيانات اتصال مؤقتة", "قد ينشئ ViewOn Link قيماً مؤقتة مثل room ID وoffer وanswer وnetwork candidate. تُستخدم فقط لإعداد الاتصال والحفاظ عليه ومصممة للحذف عند انتهاء الاتصال."], ["4. نفس شبكة Wi‑Fi وجودة الاتصال", "صُمم ViewOn Link أساساً للاستخدام عندما يكون الجهازان على نفس شبكة Wi‑Fi. بعد الاتصال قد يحتاج التطبيق وقتاً قصيراً لضبط جودة الصورة حسب حالة الشبكة وأداء الجهاز."], ["5. خدمات الطرف الثالث", "قد يستخدم ViewOn Link خدمات Firebase لمعالجة إشارات الاتصال المؤقتة وإعدادات التحديث واستقرار الخدمة."], ["6. تفضيل لغة الموقع", "قد يحفظ هذا الموقع اللغة المختارة في التخزين المحلي للمتصفح لفتح الصفحة بنفس اللغة لاحقاً."], ["7. الاختبار المجاني وميزات Pro المستقبلية والمشتريات داخل التطبيق", "يُقدَّم ViewOn Link حاليًا كخدمة اختبار مجانية/اختبار مفتوح. وبناءً على نتائج الاختبار وملاحظات المستخدمين، قد تتم إضافة بعض الميزات أو تغييرها أو فصلها كميزات Pro في المستقبل، وقد يتم تقديم عمليات شراء داخل التطبيق. سيتم توضيح سعر وشروط أي ميزة مدفوعة قبل الشراء، وستتم معالجة المدفوعات من خلال نظام ovide and secure the service."], ["6. Preferencia de idioma del sitio web", "This website may save the selected language in the browser’s local storage so the page can open in the same language next time."], ["7. Prueba gratuita, futuras funciones Pro y compras dentro de la app", "ViewOn Link se ofrece actualmente como servicio gratuito de prueba/prueba abierta. Según los resultados de las pruebas y los comentarios de los usuarios, algunas funciones podrán añadirse, modificarse o separarse como funciones Pro en el futuro, y podrán introducirse compras dentro de la app. Cualquier función de pago mostrará claramente su precio y condiciones antes de la compra, y los pagos se procesarán mediante el sistema oficial de pago de cada tienda de apps."], ["8. Compartir y vender datos", "ViewOn Link does not sell personal information. ViewOn Link does not share or sell your camera screen, photos, or videos to advertisers. Even if future Pro features or in-app purchases are added, personal information will not be sold or shared for advertising purposes."], ["9. Contacto", "For privacy questions, contact us at natchrai75@Gmail.com."]], "fr": [["1. Informations non requises", "ViewOn Link does not require account registration for the basic camera connection feature. We do not ask for your name, phone number, contacts, or precise location to use this feature."], ["2. Caméra, photos et vidéos", "Camera permission is used for camera preview, QR scanning, magnifier mode, and streaming the camera view to the paired device. Photos or videos are saved only when you choose to capture or record, and they are stored on your device."], ["3. Données temporaires de connexion", "To connect devices, ViewOn Link may create temporary connection values such as a room ID, offer, answer, and network candidate information. These values are used only to set up and maintain the connection and are designed to be deleted when the connection ends."], ["4. Même Wi‑Fi et qualité de connexion", "ViewOn Link const DEFAULT_LANG = "en";
const RTL_LANGS = new Set(["ar"]);

function getInitialLang() {
  const saved = localStorage.getItem("viewon_language");
  if (saved && TITLES[saved]) return saved;
  const browser = (navigator.language || DEFAULT_LANG).slice(0, 2).toLowerCase();
  return TITLES[browser] ? browser : DEFAULT_LANG;
}

function setTextForCommon(lang) {
  document.querySelectorAll("[data-common]").forEach((el) => {
    const key = el.getAttribute("data-common");
    if (COMMON[lang] && COMMON[lang][key]) el.textContent = COMMON[lang][key];
  });
}

function render(lang) {
  document.documentElement.lang = lang;
  document.documentElement.dir = RTL_LANGS.has(lang) ? "rtl" : "ltr";
  document.title = "ViewOn Link - " + TITLES[lang];
  document.getElementById("pageTitle").textContent = TITLES[lang];
  document.getElementById("pageIntro").textContent = INTROS[lang];
  document.getElementById("updatedText").textContent = UPDATED[lang];
  document.getElementById("noticeText").textContent = NOTICE[lang];

  const content = document.getElementById("content");
  content.innerHTML = "";
  SECTIONS[lang].forEach(([heading, body]) => {
    const section = document.createElement("section");
    section.className = "policy-section";
    const h2 = document.createElement("h2");
    h2.textContent = heading;
    const p = document.createElement("p");
    p.textContent = body;
    section.appendChild(h2);
    section.appendChild(p);
    content.appendChild(section);
  });

  setTextForCommon(lang);
  syncLanguageMenu(lang);
  localStorage.setItem("viewon_language", lang);
}

const languageControl = document.getElementById("languageControl");
const languageTrigger = document.getElementById("languageTrigger");
const languageCurrent = document.getElementById("languageCurrent");
const languageOptions = Array.from(document.querySelectorAll("[data-lang-option]"));

function syncLanguageMenu(lang) {
  if (languageCurrent) languageCurrent.textContent = LANG_NAMES[lang] || LANG_NAMES[DEFAULT_LANG];
  languageOptions.forEach((option) => {
    const isActive = option.getAttribute("data-lang-option") === lang;
    option.classList.toggle("is-active", isActive);
    option.setAttribute("aria-selected", isActive ? "true" : "false");
  });
}

function closeLanguageMenu() {
  if (!languageControl) return;
  languageControl.classList.remove("is-open");
  if (languageTrigger) languageTrigger.setAttribute("aria-expanded", "false");
}

function openLanguageMenu() {
  if (!languageControl) return;
  languageControl.classList.add("is-open");
  if (languageTrigger) languageTrigger.setAttribute("aria-expanded", "true");
}

if (languageTrigger) {
  languageTrigger.addEventListener("click", (event) => {
    event.stopPropagation();
    if (languageControl.classList.contains("is-open")) closeLanguageMenu();
    else openLanguageMenu();
  });
}

languageOptions.forEach((option) => {
  option.addEventListener("click", () => {
    const lang = option.getAttribute("data-lang-option");
    if (lang && TITLES[lang]) render(lang);
    closeLanguageMenu();
  });
});

document.addEventListener("click", (event) => {
  if (!languageControl || !languageControl.contains(event.target)) closeLanguageMenu();
});

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closeLanguageMenu();
});

const initialLang = getInitialLang();
render(initialLang);
</script>
</body>
</html>
