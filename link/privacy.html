.nav{display:flex;align-items:center;gap:16px;color:rgba(255,255,255,.82);font-size:14px;font-weight:800;flex-wrap:wrap;justify-content:flex-end}
.nav a{transition:.2s color,.2s opacity}.nav a:hover{color:white;opacity:.92}
.language-control{position:relative;display:inline-flex;align-items:center}
.language-trigger{position:relative;display:inline-flex;align-items:center;gap:8px;min-height:38px;padding:0 36px 0 12px;border:1px solid rgba(126,232,255,.32);border-radius:999px;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.055));color:var(--text);box-shadow:0 0 22px rgba(66,223,255,.10),inset 0 1px 0 rgba(255,255,255,.12);font:inherit;font-size:13px;font-weight:900;cursor:pointer}
.language-trigger::after{content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid rgba(255,255,255,.72);border-bottom:2px solid rgba(255,255,255,.72);transform:translateY(-65%) rotate(45deg)}
.language-control.is-open .language-trigger::after{transform:translateY(-35%) rotate(225deg)}
.language-menu{position:absolute;right:0;top:calc(100% + 12px);width:190px;padding:8px;border:1px solid rgba(126,232,255,.32);border-radius:22px;background:linear-gradient(180deg,rgba(6,20,39,.96),rgba(2,8,23,.94));box-shadow:0 24px 70px rgba(0,0,0,.42),0 0 36px rgba(66,223,255,.13);backdrop-filter:blur(18px);opacity:0;visibility:hidden;transform:translateY(-8px) scale(.98);transform-origin:top right;transition:.18s;z-index:100}
.language-control.is-open .language-menu{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.language-option{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 12px;border:0;border-radius:15px;background:transparent;color:rgba(247,251,255,.86);font:inherit;font-size:14px;font-weight:850;cursor:pointer;text-align:left}
.language-option:hover{background:rgba(126,232,255,.11);color:#fff}
.language-option.is-active{background:linear-gradient(135deg,rgba(66,223,255,.18),rgba(125,247,212,.10));color:#fff}
.language-check{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(126,232,255,.30);color:transparent;font-size:12px;flex:0 0 auto}
.language-option.is-active .language-check{color:#7df7d4;border-color:rgba(125,247,212,.55);background:rgba(125,247,212,.12)}
.hero{padding:82px max(22px,calc((100vw - 940px)/2)) 44px}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(126,232,255,.08);color:#95ecff;font-size:13px;font-weight:900;margin-bottom:18px}
h1{margin:0;font-size:clamp(42px,5vw,76px);line-height:1.03;letter-spacing:-.075em}
.lead{margin:22px 0 0;color:var(--muted);font-size:clamp(17px,1.6vw,21px);line-height:1.78;font-weight:650;letter-spacing:-.035em;max-width:820px}
.back-link{display:inline-flex;margin-top:28px;padding:13px 18px;border-radius:999px;border:1px solid var(--line-strong);background:rgba(66,223,255,.12);font-weight:900;color:white}
.content{padding:26px max(22px,calc((100vw - 940px)/2)) 92px;display:grid;gap:16px}
.policy-card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.035));border-radius:26px;padding:26px;box-shadow:0 20px 64px rgba(0,0,0,.22)}
.policy-card h2{margin:0;font-size:22px;letter-spacing:-.045em;line-height:1.35}

.reveal-up{opacity:0;transform:translateY(18px);transition:opacity .55s ease,transform .55s ease}.reveal-up.is-visible{opacity:1;transform:translateY(0)}
html[dir="rtl"] body{font-family:Arial,"Noto Sans Arabic","Apple SD Gothic Neo","Noto Sans KR",sans-serif}
html[dir="rtl"] .topbar,html[dir="rtl"] .nav,html[dir="rtl"] .brand,html[dir="rtl"] .footer{direction:rtl}
html[dir="rtl"] .hero,html[dir="rtl"] .content,html[dir="rtl"] .policy-card{text-align:right}
html[dir="rtl"] .language-trigger{padding:0 12px 0 36px}html[dir="rtl"] .language-trigger::after{right:auto;left:14px}html[dir="rtl"] .language-menu{right:auto;left:0;transform-origin:top left}html[dir="rtl"] .language-option{text-align:right}
@media(max-width:760px){.topbar{align-items:flex-start;gap:14px;flex-direction:column;padding:14px 18px}.nav{justify-content:flex-start;gap:12px}.nav a.optional{display:none}.hero{padding:52px 18px 30px}.content{padding:20px 18px 70px}.policy-card{padding:21px;border-radius:22px}.footer{flex-direction:column;align-items:flex-start;padding:36px 18px}}
</style>

  "ja": {
    "meta.title.privacy": "ViewOn Link - プライバシーポリシー",

    "footer.tagline": "リアルタイムカメラ共有",
    "footer.top": "トップへ",
    "privacy.title": "プライバシーポリシー",
    "privacy.intro": "ViewOn Linkは、QRコードで2台のデバイスを接続し、一方のカメラ映像をもう一方のデバイスでリアルタイムに確認できるように設計されたアプリです。本ポリシーでは、使用される情報とその取り扱いについて説明します。",
    "privacy.s1.t": "1. 必須ではない情報",
    "privacy.s1.p": "ViewOn Linkはアカウント登録を必要としません。基本的なカメラ接続機能の利用に、氏名、メールアドレス、電話番号、連絡先、正確な位置情報は求めません。",
    "privacy.s2.t": "2. カメラ、写真、動画",
    "privacy.s2.p": "アプリはカメラプレビュー、QRコードのスキャン、拡大鏡モード、ペアリングしたデバイスへのカメラ映像送信のためにカメラ権限を使用します。写真や動画は、ユーザーが撮影または録画を選択した場合にのみ端末に保存されます。",
    "privacy.s3.t": "3. 一時的な接続データ",
    "privacy.s3.p": "ViewOn Linkは、デバイス接続に必要な一時的な値を毎回新しく作成します。これらの値は接続の設定と維持の間だけ使用され、接続終了時に削除されます。",
    "privacy.s4.t": "4. 同じWi‑Fiとローカル接続",
    "privacy.s4.p": "ViewOn Linkは、両方のデバイスが同じWi‑Fiネットワークに接続されている状態で使用することを想定しています。接続前の案内のためにネットワーク状態を確認する場合があります。",
    "privacy.s5.t": "5. ウェブサイトの言語設定",
    "privacy.s5.p": "このウェブサイトは、次回も同じ言語で表示するため、選択した言語をブラウザのローカルストレージに保存する場合があります。",
    "privacy.s6.t": "6. 第三者サービス",
    "privacy.s6.p": "アプリは一時的な接続シグナリングと更新設定の確認のためFirebaseサービスを使用する場合があります。これらのサービスは機能提供と安全性確保に必要な技術情報を処理する場合があります。",
    "privacy.s7.t": "7. 共有と販売",
    "privacy.s7.p": "ViewOn Linkは、カメラ画面、写真、動画を広告主と共有または販売しません。今後Pro機能またはアプリ内購入が追加された場合でも、決済はアプリマーケットの決済システムを通じて処理され、ViewOn Linkは決済機能の提供に必要な範囲を超えて個人情報を販売したり、広告目的で共有したりしません。",
    "privacy.s8.t": "8. お問い合わせ",
    "privacy.s8.p": "プライバシーに関するお問い合わせは natchrai75@Gmail.com までご連絡ください。",
    "terms.title": "利用規約",
    "terms.intro": "ViewOn Linkを使用することで、本規約に同意したものとみなされます。同意しない場合はアプリを使用しないでください。",
    "terms.s1.t": "1. アプリの目的",
    "terms.s1.p": "ViewOn Linkは、QRコードで2台のデバイスを接続し、一方のカメラ映像を別のデバイスでリアルタイムに確認できるようにします。",
    "terms.s2.t": "2. 安全で合法的な利用",
    "terms.s2.p": "ユーザーはアプリを合法的に使用し、他者のプライバシーを尊重する必要があります。隠し監視、嫌がらせ、無断録画、違法行為には使用できません。",
    "terms.s3.t": "3. 権限と保存ファイル",
    "terms.s3.p": "アプリはQRスキャン、カメラ共有、拡大鏡機能のためにカメラ権限を必要とします。写真や動画はユーザーが保存を選択した場合にのみ保存されます。",
    "terms.s4.t": "4. テスト期間と変更",
    "terms.s4.p": "クローズドテストまたはオープンテスト期間中、一部機能は改善のため制限、変更、中断、削除される場合があります。",
    "terms.s5.t": "5. 無料機能と今後のPro機能",
    "terms.s5.p": "今後、無料機能、Pro機能、アプリ内購入が追加される場合があります。有料機能は購入前に明確に表示されます。",
    "terms.s6.t": "6. 免責",
    "terms.s6.p": "ViewOn Linkは現状のまま提供されます。ネットワーク状態、端末性能、カメラ互換性、OSの制限により接続品質が変わる場合があります。",
    "terms.s7.t": "7. お問い合わせ",
    "terms.s7.p": "本規約に関するお問い合わせは natchrai75@Gmail.com までご連絡ください。",
    "support.title": "サポート",
    "support.intro": "ViewOn Linkで問題がある場合は、以下を確認するかお問い合わせください。",
    "support.s1.t": "接続チェック",
    "support.s1.p": "両方のデバイスが同じWi‑Fiに接続されていることを確認し、カメラ権限を許可して、CameraデバイスでQRを作成しViewerデバイスでスキャンしてください。",
    "support.s2.t": "QRスキャンできない場合",
    "support.s2.p": "カメラ権限、画面の明るさ、ピント、QRコードとの距離を確認してください。古いQRが無効な場合は新しいQRを作成してください。",
    "support.s3.t": "Viewer画面が遅い・不鮮明な場合",
    "support.s3.p": "画質を下げ、Wi‑Fiルーターに近づくか、バックグラウンドの重いアプリを終了してください。",
    "support.s4.t": "拡大鏡モード",
    "support.s4.p": "拡大鏡モードは2台のデバイスを接続しなくても使用できます。小さな文字、部品番号、小さな物の確認に便利です。",
    "support.s5.t": "お問い合わせメール",
    "support.s5.p": "メール: natchrai75@Gmail.com"

    "footer.tagline": "Kamera in Echtzeit teilen",
    "footer.top": "Nach oben",
    "privacy.title": "Datenschutzerklärung",
    "privacy.intro": "ViewOn Link verbindet zwei Geräte per QR-Code, damit die Kamera eines Geräts in Echtzeit auf einem anderen Gerät angezeigt werden kann. Diese Erklärung beschreibt, welche Informationen verwendet und wie sie verarbeitet werden.",
    "privacy.s1.t": "1. Informationen, die wir nicht verlangen",
    "privacy.s1.p": "ViewOn Link erfordert keine Registrierung. Für die grundlegende Kameraverbindung fragen wir nicht nach Name, E-Mail-Adresse, Telefonnummer, Kontakten oder genauer Standortangabe.",
    "privacy.s2.t": "2. Kamera, Fotos und Videos",
    "privacy.s2.p": "Die App verwendet die Kameraberechtigung für Kameravorschau, QR-Scan, Lupenmodus und die Übertragung des Kamerabildes an das gekoppelte Gerät. Fotos oder Videos werden nur gespeichert, wenn du Aufnahme oder Speicherung auswählst, und bleiben auf deinem Gerät.",
    "privacy.s3.t": "3. Temporäre Verbindungsdaten",
    "privacy.s3.p": "ViewOn Link erstellt für jede Geräteverbindung neue temporäre Werte. Diese Werte werden nur zum Einrichten und Aufrechterhalten der Verbindung verwendet und beim Beenden der Verbindung gelöscht.",
    "privacy.s4.t": "4. Gleiches Wi‑Fi und lokale Verbindung",
    "privacy.s4.p": "ViewOn Link ist für die Nutzung konzipiert, wenn beide Geräte mit demselben Wi‑Fi verbunden sind. Die App kann den Netzwerkstatus prüfen, um dich vor der Verbindung zu informieren.",
    "privacy.s5.t": "5. Spracheinstellung der Website",
    "privacy.s5.p": "Diese Website kann die gewählte Sprache im lokalen Speicher deines Browsers speichern, damit sie beim nächsten Besuch wieder in derselben Sprache geöffnet wird.",
    "privacy.s6.t": "6. Drittanbieterdienste",
    "privacy.s6.p": "Die App kann Firebase-Dienste für temporäre Verbindungssignalisierung und Update-Konfiguration verwenden. Diese Dienste können technische Daten verarbeiten, die für Bereitstellung und Sicherheit nötig sind.",
    "privacy.s7.t": "7. Weitergabe und Verkauf",
    "privacy.s7.p": "ViewOn Link teilt oder verkauft dein Kamerabild, Fotos oder Videos nicht an Werbetreibende. Auch wenn künftig Pro-Funktionen oder In-App-Käufe hinzugefügt werden, werden Zahlungen über das Zahlungssystem des App-Markts abgewickelt, und ViewOn Link verkauft personenbezogene Daten nicht und teilt sie nicht zu Werbezwecken über das hinaus, was zur Bereitstellung zahlungsbezogener Funktionen erforderlich ist.",
    "privacy.s8.t": "8. Kontakt",
    "privacy.s8.p": "Bei Datenschutzfragen kontaktiere uns unter natchrai75@Gmail.com.",
    "terms.title": "Nutzungsbedingungen",
    "terms.intro": "Durch die Nutzung von ViewOn Link stimmst du diesen Bedingungen zu. Wenn du nicht zustimmst, nutze die App bitte nicht.",
    "terms.s1.t": "1. Zweck der App",
    "terms.s1.p": "ViewOn Link hilft, zwei Geräte per QR-Code zu verbinden und die Kamera eines Geräts auf einem anderen Gerät in Echtzeit anzusehen.",
    "terms.s2.t": "2. Sichere und rechtmäßige Nutzung",
    "terms.s2.p": "Du musst die App rechtmäßig nutzen und die Privatsphäre anderer respektieren. Verboten sind versteckte Überwachung, Belästigung, unerlaubte Aufnahmen oder illegale Nutzung.",
    "terms.s3.t": "3. Berechtigungen und gespeicherte Dateien",
    "terms.s3.p": "Die App benötigt Kameraberechtigung für QR-Scan, Kamerafreigabe und Lupenfunktionen. Fotos und Videos werden nur gespeichert, wenn du die Speicherung auswählst.",
    "terms.s4.t": "4. Testphase und Änderungen",
    "terms.s4.p": "Während geschlossener oder offener Tests können Funktionen eingeschränkt, geändert, unterbrochen oder entfernt werden, um die App zu verbessern.",
    "terms.s5.t": "5. Kostenlose und künftige Pro-Funktionen",
    "terms.s5.p": "Die App kann später kostenlose und Pro-Funktionen oder In-App-Käufe hinzufügen. Kostenpflichtige Funktionen werden vor dem Kauf klar angezeigt.",
    "terms.s6.t": "6. Haftungsausschluss",
    "terms.s6.p": "ViewOn Link wird wie besehen bereitgestellt. Netzwerkbedingungen, Geräteleistung, Kamerakompatibilität und Betriebssystembeschränkungen können die Verbindungsqualität beeinflussen.",
    "terms.s7.t": "7. Kontakt",
    "terms.s7.p": "Fragen zu diesen Bedingungen: natchrai75@Gmail.com.",
    "support.title": "Support",
    "support.intro": "Brauchst du Hilfe mit ViewOn Link? Prüfe die Punkte unten oder kontaktiere uns.",
    "support.s1.t": "Verbindungs-Checkliste",
    "support.s1.p": "Stelle sicher, dass beide Geräte im selben Wi‑Fi sind, erlaube die Kamera, erstelle den QR auf dem Camera-Gerät und scanne ihn auf dem Viewer-Gerät.",
    "support.s2.t": "QR-Scan funktioniert nicht",
    "support.s2.p": "Prüfe Kameraberechtigung, Helligkeit, Fokus und Abstand zum QR-Code. Erstelle einen neuen QR-Code, wenn der alte abgelaufen ist.",
    "support.s3.t": "Viewer-Bild ist verzögert oder unscharf",
    "support.s3.p": "Wähle eine niedrigere Qualität, gehe näher zum Wi‑Fi-Router oder schließe ressourcenintensive Apps im Hintergrund.",
    "support.s4.t": "Lupenmodus",
    "support.s4.p": "Der Lupenmodus kann ohne Verbindung zweier Geräte genutzt werden. Er ist nützlich für kleine Schrift, Teilenummern und kleine Objekte.",
    "support.s5.t": "Kontakt-E-Mail",
    "support.s5.p": "E-Mail: natchrai75@Gmail.com"
  },

    "privacy.title": "Política de privacidad",
    "privacy.intro": "ViewOn Link está diseñado para conectar dos dispositivos con un código QR y ver en tiempo real la cámara de un dispositivo en otro. Esta política explica qué información se usa y cómo se trata.",
    "privacy.s1.t": "1. Información que no requerimos",
    "privacy.s1.p": "ViewOn Link no requiere registro de cuenta. No solicitamos nombre, correo electrónico, teléfono, contactos ni ubicación precisa para usar la conexión básica de cámara.",
    "privacy.s2.t": "2. Cámara, fotos y vídeos",
    "privacy.s2.p": "La app usa el permiso de cámara para la vista previa, el escaneo QR, el modo lupa y la transmisión al dispositivo emparejado. Las fotos o vídeos solo se guardan cuando eliges capturar o grabar, y se almacenan en tu dispositivo.",
    "privacy.s3.t": "3. Datos temporales de conexión",
    "privacy.s3.p": "ViewOn Link crea nuevos valores temporales necesarios para cada conexión entre dispositivos. Estos valores se usan solo para configurar y mantener la conexión, y se eliminan cuando la conexión termina.",
    "privacy.s4.t": "4. Misma Wi‑Fi y conexión local",
    "privacy.s4.p": "ViewOn Link está diseñado para usarse cuando ambos dispositivos están conectados a la misma red Wi‑Fi. La app puede comprobar el estado de la red antes de conectar.",
    "privacy.s5.t": "5. Preferencia de idioma del sitio web",
    "privacy.s5.p": "Este sitio puede guardar el idioma seleccionado en el almacenamiento local del navegador para abrirse en el mismo idioma la próxima vez.",
    "privacy.s6.t": "6. Servicios de terceros",
    "privacy.s6.p": "La app puede usar Firebase para señalización temporal de conexión y configuración de actualizaciones. Estos servicios pueden procesar datos técnicos necesarios para ofrecer y proteger el servicio.",
    "privacy.s7.t": "7. Compartir y vender datos",
    "privacy.s7.p": "ViewOn Link no comparte ni vende la pantalla de la cámara, fotos ni vídeos a anunciantes. Incluso si en el futuro se añaden funciones Pro o compras dentro de la app, los pagos se procesarán mediante el sistema de pago del mercado de apps, y ViewOn Link no venderá información personal ni la compartirá con fines publicitarios más allá de lo necesario para ofrecer funciones relacionadas con el pago.",
    "privacy.s8.t": "8. Contacto",
    "privacy.s8.p": "Para preguntas de privacidad, contáctanos en natchrai75@Gmail.com.",
    "terms.title": "Términos de uso",
    "terms.intro": "Al usar ViewOn Link, aceptas estos términos. Si no estás de acuerdo, no uses la app.",
    "terms.s1.t": "1. Finalidad de la app",
    "terms.s1.p": "ViewOn Link ayuda a conectar dos dispositivos por QR y ver la cámara de un dispositivo desde otro en tiempo real.",
    "terms.s2.t": "2. Uso seguro y legal",
    "terms.s2.p": "Debes usar la app legalmente y respetar la privacidad de otras personas. No la uses para vigilancia oculta, acoso, grabaciones no autorizadas ni actividades ilegales.",
    "terms.s3.t": "3. Permisos y archivos guardados",
    "terms.s3.p": "La app requiere cámara para escanear QR, compartir cámara y usar la lupa. Las fotos y vídeos solo se guardan cuando eliges guardarlos.",
    "terms.s4.t": "4. Pruebas y cambios del servicio",
    "terms.s4.p": "Durante pruebas cerradas o abiertas, algunas funciones pueden limitarse, cambiar, interrumpirse o eliminarse para mejorar la app.",
    "terms.s5.t": "5. Funciones gratis y futuras Pro",
    "terms.s5.p": "La app puede añadir funciones Free y Pro o compras dentro de la app. Cualquier función de pago se mostrará claramente antes de comprar.",
    "terms.s6.t": "6. Descargo de responsabilidad",
    "terms.s6.p": "ViewOn Link se ofrece tal cual. La red, el rendimiento del dispositivo, la compatibilidad de cámara y el sistema operativo pueden afectar la calidad.",
    "terms.s7.t": "7. Contacto",
    "terms.s7.p": "Preguntas sobre estos términos: natchrai75@Gmail.com.",
    "support.title": "Soporte",
    "support.intro": "¿Necesitas ayuda con ViewOn Link? Revisa lo siguiente o contáctanos.",

    "support.s2.t": "El QR no se escanea",
    "support.s2.p": "Revisa permiso de cámara, brillo, enfoque y distancia. Crea un nuevo QR si el anterior venció.",
    "support.s3.t": "La pantalla Viewer va lenta o borrosa",

const SUPPORTED_LANGS = ["en","ar","de","es","fr","ja","ko"];
const LANGUAGE_LABELS = {"en":"English","ar":"العربية","de":"Deutsch","es":"Español","fr":"Français","ja":"日本語","ko":"한국어"};
function normalizeLang(lang){
  if(!lang) return null;
  const lower = String(lang).toLowerCase();
  if(lower.startsWith("ko")) return "ko";
  if(lower.startsWith("ja")) return "ja";
  if(lower.startsWith("ar")) return "ar";
  if(lower.startsWith("de")) return "de";
  if(lower.startsWith("es")) return "es";
  if(lower.startsWith("fr")) return "fr";
  if(lower.startsWith("en")) return "en";
  return null;
}
function detectInitialLang(){
  const saved = localStorage.getItem("viewon_link_site_lang");
  if(SUPPORTED_LANGS.includes(saved)) return saved;
  const langs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language, navigator.userLanguage, navigator.browserLanguage];
  for(const lang of langs){ const n = normalizeLang(lang); if(n) return n; }
  return "en";
}
function applyLang(lang){
  if(!SUPPORTED_LANGS.includes(lang)) lang = "en";
  localStorage.setItem("viewon_link_site_lang", lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  const dict = I18N[lang] || I18N.en;
  document.title = dict["meta.title."+PAGE_TYPE] || "ViewOn Link";
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if(dict[key]) el.innerHTML = dict[key];
  });
  const current = document.getElementById("languageCurrent");
  if(current) current.textContent = LANGUAGE_LABELS[lang] || "English";
  document.querySelectorAll("[data-lang-option]").forEach(btn => {
    const active = btn.getAttribute("data-lang-option") === lang;
    btn.classList.toggle("is-active", active);
    btn.setAttribute("aria-selected", active ? "true" : "false");
  });
}
const languageControl=document.getElementById("languageControl");
const languageTrigger=document.getElementById("languageTrigger");
const languageMenu=document.getElementById("languageMenu");
languageTrigger?.addEventListener("click",()=>{
  const opened=languageControl.classList.toggle("is-open");
  languageTrigger.setAttribute("aria-expanded",opened?"true":"false");
});
document.querySelectorAll("[data-lang-option]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    applyLang(btn.getAttribute("data-lang-option"));
    languageControl.classList.remove("is-open");
    languageTrigger.setAttribute("aria-expanded","false");
  });
});
document.addEventListener("click",(e)=>{
  if(languageControl && !languageControl.contains(e.target)){
    languageControl.classList.remove("is-open");
    languageTrigger?.setAttribute("aria-expanded","false");
  }
});
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("is-visible");observer.unobserve(entry.target);}});
},{threshold:.12});
document.querySelectorAll(".reveal-up").forEach(el=>observer.observe(el));
applyLang(detectInitialLang());
</script>
